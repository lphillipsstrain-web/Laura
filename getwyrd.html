<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>⟁</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="gate-body">

  <div id="gateWall" class="gate-wall">
    <div class="gate-box">
      <div class="gate-rune">⟁</div>
      <p class="gate-prompt">speak the word</p>
      <input
        type="password"
        id="gateInput"
        class="gate-input"
        placeholder="···"
        autocomplete="off"
        spellcheck="false"
      />
      <p id="gateError" class="gate-error" aria-live="polite"></p>
    </div>
  </div>

  <main id="secretContent" class="secret-content" hidden>
    <div class="shell">
      <h1>The Hidden Room</h1>
      <p class="text-muted">You found it. Add your content here.</p>

      <!-- YOUR SECRET CONTENT GOES HERE -->

    </div>
  </main>

<script>
  const CORRECT = 'CelestialDelights'; // <-- change this

  const wall = document.getElementById('gateWall');
  const input = document.getElementById('gateInput');
  const error = document.getElementById('gateError');
  const content = document.getElementById('secretContent');

  // Check if already authenticated this session
  if (sessionStorage.getItem('wyrd_auth') === '1') {
    wall.remove();
    content.hidden = false;
  }

  input.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    const val = input.value.trim().toLowerCase();
    if (val === CORRECT.toLowerCase()) {
      sessionStorage.setItem('wyrd_auth', '1');
      wall.style.opacity = '0';
      wall.style.transition = 'opacity 0.6s ease';
      setTimeout(() => {
        wall.remove();
        content.hidden = false;
      }, 600);
    } else {
      error.textContent = 'the threshold does not open';
      input.value = '';
      input.classList.add('gate-shake');
      setTimeout(() => input.classList.remove('gate-shake'), 500);
    }
  });
</script>

</body>
</html>
